name: Deploy Production

# Manual-only production deployment for sofilic.com (/opt/aiow on the VPS).
# Never triggered by push. Modes:
#   deploy               — full release: backup tag + .env backup, ff-pull,
#                          verify expected commit, migrate, build, restart,
#                          verify everything, AUTO-ROLLBACK on any failure.
#   rollback             — roll production back to a given tag/commit.
#   cleanup-test-tenants — delete tenants named 'ZZ RELEASE VERIFY%' created
#                          by post-deploy smoke tests (cascade removes data).
# Secrets: PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY (or PROD_SSH_PASSWORD).
# No secret values are ever echoed.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'deploy | smoke | rollback | cleanup-test-tenants | logs | voyage-report | voyage-migrate'
        required: true
        default: 'deploy'
      search:
        description: 'logs: grep pattern (e.g. a correlation id)'
        required: false
        default: ''
      expected_commit:
        description: 'deploy: full SHA that must be contained in main'
        required: false
        default: ''
      rollback_to:
        description: 'rollback: tag or SHA to restore'
        required: false
        default: ''

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      # Checkout FIRST: actions/checkout wipes the workspace, so it must never
      # run after remote.sh is written (run #3 lost the cleanup step to this).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH auth
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if [ -n "${PROD_SSH_KEY:-}" ]; then
            printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_key
            chmod 600 ~/.ssh/prod_key
            echo "AUTH_MODE=key" >> "$GITHUB_ENV"
          elif [ -n "${PROD_SSH_PASSWORD:-}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
            echo "AUTH_MODE=password" >> "$GITHUB_ENV"
          else
            echo "Neither PROD_SSH_KEY nor PROD_SSH_PASSWORD is set." >&2
            exit 1
          fi

      - name: Write remote script
        env:
          MODE: ${{ inputs.mode }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          ROLLBACK_TO: ${{ inputs.rollback_to }}
          SEARCH: ${{ inputs.search }}
        run: |
          cat > remote.sh <<'REMOTE'
          set -euo pipefail
          cd /opt/aiow
          STAMP=$(date +%Y%m%d-%H%M%S)

          # SQL travels via STDIN (-f -): nesting it inside the sh -lc string
          # let the container shell strip inner double quotes, which lowercased
          # CamelCase identifiers ("AgentApproval" → agentapproval) and made
          # every table check fail falsely on deploy run #1.
          psql_t() { printf '%s' "$1" | docker compose exec -T postgres sh -lc 'psql -U "${POSTGRES_USER:-aiow}" -d "${POSTGRES_DB:-aiow}" -tA -f -'; }

          verify_all() {
            local ok=0
            echo "== docker compose ps =="; docker compose ps
            curl -fsS http://127.0.0.1:4000/api/health | grep -q sofilic-api || { echo "FAIL api health"; ok=1; }
            [ "$(curl -s -o /dev/null -w '%{http_code}' https://sofilic.com/)" = "200" ] || { echo "FAIL web /"; ok=1; }
            [ "$(curl -s -o /dev/null -w '%{http_code}' https://sofilic.com/robots.txt)" = "200" ] || { echo "FAIL robots"; ok=1; }
            [ "$(curl -s -o /dev/null -w '%{http_code}' https://sofilic.com/sitemap.xml)" = "200" ] || { echo "FAIL sitemap"; ok=1; }
            local DASH; DASH=$(curl -fsS https://sofilic.com/dashboard || true)
            echo "$DASH" | grep -q 'name="robots" content="noindex' || { echo "FAIL dashboard noindex"; ok=1; }
            echo "$DASH" | grep -q 'os-topbar' && { echo "FAIL dashboard shell leak"; ok=1; }
            for t in AgentApproval AiUsageEvent CompanyProfile Goal Kpi KpiSnapshot; do
              [ "$(psql_t "SELECT to_regclass('\"$t\"') IS NOT NULL;")" = "t" ] || { echo "FAIL table $t"; ok=1; }
            done
            [ "$(psql_t "SELECT count(*) FROM pg_indexes WHERE indexname LIKE '%hnsw%';")" = "2" ] || { echo "FAIL hnsw indexes"; ok=1; }
            [ "$(psql_t "SELECT count(*) FROM _prisma_migrations WHERE finished_at IS NOT NULL;")" = "7" ] || { echo "FAIL migration count != 7"; ok=1; }
            psql_t "SELECT column_default FROM information_schema.columns WHERE table_name='AgentInstallation' AND column_name='authority';" | grep -q APPROVE || { echo "FAIL authority default"; ok=1; }
            if ss -tln | grep -E ':(3000|4000|5432|6379)\b' | grep -vE '127\.0\.0\.1|\[::1\]'; then echo "FAIL port exposure"; ok=1; fi
            return $ok
          }

          case "$MODE" in
            deploy)
              [ -n "$EXPECTED_COMMIT" ] || { echo "expected_commit required"; exit 1; }
              echo "== Pre-deploy state: $(git rev-parse --short HEAD)"
              if [ -n "$(git status --porcelain)" ]; then echo "Working tree dirty — aborting"; git status --short; exit 1; fi
              PREV=$(git rev-parse HEAD)
              git tag "pre-release-4-${STAMP}" || true
              cp .env ".env.backup-${STAMP}" && chmod 600 ".env.backup-${STAMP}"
              echo "== Backup: tag pre-release-4-${STAMP}, .env.backup-${STAMP} (contents not shown)"
              grep -q '^ANTHROPIC_API_KEY=..*' .env && echo "== ANTHROPIC_API_KEY: present" || echo "== ANTHROPIC_API_KEY: NOT set (stub mode)"
              grep -q '^LLM_PRICING=..*' .env && echo "== LLM_PRICING: present" || echo "== LLM_PRICING: NOT set"
              git fetch origin main && git checkout main && git pull --ff-only origin main
              git merge-base --is-ancestor "$EXPECTED_COMMIT" HEAD || { echo "Expected commit $EXPECTED_COMMIT not in main"; exit 1; }
              echo "== Deploying $(git rev-parse --short HEAD)"
              docker compose build api worker web
              docker compose run --rm api npx prisma migrate deploy
              docker compose up -d
              echo "== Waiting 25s for startup"; sleep 25
              if verify_all; then
                echo "== Recent logs:"; docker compose logs --tail 20 api; docker compose logs --tail 10 web
                echo "DEPLOY_OK commit=$(git rev-parse HEAD) restore_tag=pre-release-4-${STAMP}"
              else
                echo "!! VERIFY FAILED — AUTO-ROLLBACK to ${PREV}"
                git checkout "$PREV"
                docker compose build api worker web
                docker compose up -d
                sleep 25
                curl -fsS http://127.0.0.1:4000/api/health && echo "ROLLBACK_HEALTHY prev=${PREV}" || echo "ROLLBACK_UNHEALTHY — manual attention required"
                docker compose logs --tail 40 api
                exit 1
              fi
              ;;
            rollback)
              [ -n "$ROLLBACK_TO" ] || { echo "rollback_to required"; exit 1; }
              git fetch --tags origin
              git checkout "$ROLLBACK_TO"
              docker compose build api worker web
              docker compose up -d
              sleep 25
              curl -fsS http://127.0.0.1:4000/api/health && echo "ROLLBACK_OK now=$(git rev-parse --short HEAD)"
              ;;
            cleanup-test-tenants)
              # Smoke-test tenants are named with this exact marker by the
              # release process; cascade delete removes all their data.
              N=$(psql_t "DELETE FROM \"Tenant\" WHERE name LIKE 'ZZ RELEASE VERIFY%'; SELECT 1;" | tail -1 || true)
              echo "CLEANUP_DONE"
              psql_t "SELECT count(*) FROM \"Tenant\" WHERE name LIKE 'ZZ RELEASE VERIFY%';"
              ;;
            smoke)
              # Runs AFTER the runner-side authenticated smoke step. First,
              # while the smoke tenant's vectors still exist, verify stored
              # embedding width in the DB; then remove the 'ZZ RELEASE
              # VERIFY%' tenants (cascade delete takes docs/chunks/memories).
              echo "EMBED_DIMS_IN_DB=$(psql_t 'SELECT COALESCE((SELECT DISTINCT vector_dims(embedding) FROM "KnowledgeChunk" WHERE embedding IS NOT NULL LIMIT 1), 0);')"
              echo "MEMORY_DIMS_IN_DB=$(psql_t 'SELECT COALESCE((SELECT DISTINCT vector_dims(embedding) FROM "EntityMemory" WHERE embedding IS NOT NULL LIMIT 1), 0);')"
              psql_t "DELETE FROM \"Tenant\" WHERE name LIKE 'ZZ RELEASE VERIFY%';" || true
              LEFT=$(psql_t "SELECT count(*) FROM \"Tenant\" WHERE name LIKE 'ZZ RELEASE VERIFY%';")
              echo "SMOKE_CLEANUP_DONE remaining=${LEFT}"
              ;;
            voyage-migrate)
              # Founder-approved embeddings migration: rotate VOYAGE_API_KEY
              # (received via stdin only — never argv, never logged, masked by
              # Actions anyway) and switch to voyage-4-lite @ 1024 dims.
              [ -n "${VOYAGE_NEW_KEY:-}" ] || { echo "no key received on stdin"; exit 1; }
              # ── Preflight: abort if ANY vectors exist (would mix voyage-3
              # and voyage-4 spaces) or the column/index shape is unexpected.
              CH=$(psql_t 'SELECT count(*) FROM "KnowledgeChunk";')
              EM=$(psql_t 'SELECT count(*) FROM "EntityMemory";')
              KC_TYPE=$(psql_t "SELECT format_type(atttypid, atttypmod) FROM pg_attribute WHERE attrelid='\"KnowledgeChunk\"'::regclass AND attname='embedding';")
              EM_TYPE=$(psql_t "SELECT format_type(atttypid, atttypmod) FROM pg_attribute WHERE attrelid='\"EntityMemory\"'::regclass AND attname='embedding';")
              HN=$(psql_t "SELECT count(*) FROM pg_indexes WHERE indexname LIKE '%hnsw%';")
              echo "PREFLIGHT chunks=${CH} memories=${EM} kc_col=${KC_TYPE} em_col=${EM_TYPE} hnsw=${HN}"
              if [ "$CH" != "0" ] || [ "$EM" != "0" ]; then
                echo "PREFLIGHT_FAIL existing vectors found — STOPPING before model change (re-embedding plan required)"; exit 1
              fi
              if [ "$KC_TYPE" != "vector(1024)" ] || [ "$EM_TYPE" != "vector(1024)" ] || [ "$HN" != "2" ]; then
                echo "PREFLIGHT_FAIL column/index shape unexpected — STOPPING"; exit 1
              fi
              # ── .env rewrite: replace exactly 3 vars, preserve all others,
              # never echo values; timestamped 600-mode backup first.
              cp .env ".env.backup-${STAMP}" && chmod 600 ".env.backup-${STAMP}"
              grep -vE '^(VOYAGE_API_KEY|EMBEDDING_MODEL|EMBEDDING_DIMS)=' .env > .env.new
              printf 'VOYAGE_API_KEY=%s\nEMBEDDING_MODEL=voyage-4-lite\nEMBEDDING_DIMS=1024\n' "$VOYAGE_NEW_KEY" >> .env.new
              chmod 600 .env.new && mv .env.new .env
              echo "ENV_UPDATED other_vars_preserved=$(grep -c '=' .env) backup=.env.backup-${STAMP} (values not shown)"
              # ── Restart ONLY the services that read the key (api + worker).
              docker compose up -d --force-recreate api worker
              echo "== waiting 25s"; sleep 25
              if ! curl -fsS http://127.0.0.1:4000/api/health | grep -q sofilic-api; then
                echo "API_UNHEALTHY — restoring .env backup and recreating"
                cp ".env.backup-${STAMP}" .env
                docker compose up -d --force-recreate api worker
                exit 1
              fi
              # ── Sanitized in-container auth probe: prints STATUS/model/dims
              # only. The key never appears in output.
              docker compose exec -T api node -e 'fetch("https://api.voyageai.com/v1/embeddings",{method:"POST",headers:{Authorization:"Bearer "+process.env.VOYAGE_API_KEY,"Content-Type":"application/json"},body:JSON.stringify({input:["sofilic auth probe"],model:process.env.EMBEDDING_MODEL,input_type:"query",output_dimension:1024})}).then(async r=>{if(r.ok){const d=await r.json();console.log("VOYAGE_AUTH_STATUS="+r.status+" model="+d.model+" dims="+(d.data&&d.data[0]?d.data[0].embedding.length:"?"))}else{console.log("VOYAGE_AUTH_STATUS="+r.status)}}).catch(e=>console.log("VOYAGE_AUTH_ERROR="+String(e&&e.message).slice(0,80)))'
              echo "MIGRATE_DONE model=voyage-4-lite dims=1024"
              ;;
            voyage-report)
              # READ-ONLY: which embedding model/dims production actually uses
              # (model names are not secrets; key values are never read) plus
              # aggregate counts for usage estimation. Changes nothing.
              grep -q '^EMBEDDING_MODEL=' .env && echo "EMBEDDING_MODEL=$(grep '^EMBEDDING_MODEL=' .env | head -1 | cut -d= -f2)" || echo "EMBEDDING_MODEL not set → code default: voyage-3"
              grep -q '^EMBEDDING_DIMS=' .env && echo "EMBEDDING_DIMS=$(grep '^EMBEDDING_DIMS=' .env | head -1 | cut -d= -f2)" || echo "EMBEDDING_DIMS not set → code default: 1024"
              grep -q '^VOYAGE_API_KEY=..*' .env && echo "VOYAGE_API_KEY: present (value not read)" || echo "VOYAGE_API_KEY: not set"
              echo "tenants=$(psql_t 'SELECT count(*) FROM "Tenant";')"
              echo "agent_tasks_30d=$(psql_t "SELECT count(*) FROM \"AgentTask\" WHERE \"createdAt\" > now() - interval '30 days';")"
              echo "knowledge_chunks_total=$(psql_t 'SELECT count(*) FROM "KnowledgeChunk";')"
              echo "entity_memories_total=$(psql_t 'SELECT count(*) FROM "EntityMemory";')"
              echo "knowledge_docs_total=$(psql_t 'SELECT count(*) FROM "KnowledgeDoc";')"
              ;;
            logs)
              # Read-only diagnostics: pull API log lines around a pattern
              # (e.g. a correlation id). Secrets never appear in app logs.
              if [ -n "$SEARCH" ]; then
                docker compose logs --tail 2000 api | grep -B 3 -A 40 -- "$SEARCH" || echo "pattern not found in last 2000 lines"
              else
                docker compose logs --tail 80 api
              fi
              ;;
            *) echo "unknown mode: $MODE"; exit 1 ;;
          esac
          REMOTE
          # Prepend run-specific variables (values are workflow inputs, not secrets).
          sed -i "1i MODE='${MODE}'; EXPECTED_COMMIT='${EXPECTED_COMMIT}'; ROLLBACK_TO='${ROLLBACK_TO}'; SEARCH='${SEARCH}'" remote.sh

      - name: Authenticated production smoke tests (mode=smoke)
        id: smoke
        if: ${{ inputs.mode == 'smoke' }}
        run: node .github/smoke/r4-prod-smoke.mjs

      - name: Run on production
        # For mode=smoke this is the tenant cleanup — it must run even when
        # the smoke step failed, so verification tenants never linger.
        if: ${{ success() || (inputs.mode == 'smoke' && !cancelled()) }}
        env:
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ConnectTimeout=15"
          # voyage-migrate: the secret travels as the FIRST LINE of stdin,
          # consumed by `read` on the far side — never argv, never a file,
          # never printed (and Actions masks it in any output regardless).
          if [ "$MODE_INPUT" = "voyage-migrate" ]; then
            [ -n "${VOYAGE_API_KEY:-}" ] || { echo "VOYAGE_API_KEY secret is not set" >&2; exit 1; }
            REMOTE_CMD='IFS= read -r VOYAGE_NEW_KEY; export VOYAGE_NEW_KEY; bash -s'
            if [ "$AUTH_MODE" = "key" ]; then
              { printf '%s\n' "$VOYAGE_API_KEY"; cat remote.sh; } | ssh $SSH_OPTS -i ~/.ssh/prod_key "$USER@$HOST" "$REMOTE_CMD"
            else
              export SSHPASS="$PROD_SSH_PASSWORD"
              { printf '%s\n' "$VOYAGE_API_KEY"; cat remote.sh; } | sshpass -e ssh $SSH_OPTS "$USER@$HOST" "$REMOTE_CMD"
            fi
          elif [ "$AUTH_MODE" = "key" ]; then
            ssh $SSH_OPTS -i ~/.ssh/prod_key "$USER@$HOST" 'bash -s' < remote.sh
          else
            # sshpass -e reads the password from SSHPASS (env, not argv).
            export SSHPASS="$PROD_SSH_PASSWORD"
            sshpass -e ssh $SSH_OPTS "$USER@$HOST" 'bash -s' < remote.sh
          fi
