name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Must match docker-compose.yml — the baseline migration runs
        # CREATE EXTENSION "vector" (Business Brain), which plain postgres lacks.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aiow
          POSTGRES_PASSWORD: aiow
          POSTGRES_DB: aiow
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aiow" --health-interval 5s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    env:
      DATABASE_URL: postgresql://aiow:aiow@localhost:5432/aiow?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" — action-setup@v4
      # errors if a version is ALSO pinned here.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @aiow/api exec prisma generate
      - run: pnpm --filter @aiow/api exec prisma migrate deploy
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
